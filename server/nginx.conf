# Nginx configuration for FaceAuth API with SSL
# Place this file as nginx.conf and use it in your deployment

server {
    listen 443 ssl;
    server_name facesure.com www.facesure.com;

    ssl_certificate     /etc/nginx/ssl/facesure.com.crt;
    ssl_certificate_key /etc/nginx/ssl/facesure.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://faceauth-api:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name facesure.com www.facesure.com;
    return 301 https://$host$request_uri;
}

# Notes:
# - Replace /etc/nginx/ssl/facesure.com.crt and .key with your actual SSL certificate and key paths.
# - The proxy_pass should match your FastAPI container name and port.
# - The second server block redirects all HTTP traffic to HTTPS.
# - Mount your SSL files in the Nginx container.
